version: '3.8'

services:
  # === 1. БАЗА ДАННЫХ (PostgreSQL) ===
  db:
    image: postgres:15-alpine
    container_name: avtokond_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: avtokond_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    # Healthcheck: ensure backend doesn't try to connect before DB is ready
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}", "-h", "localhost", "-p", "5432" ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  # === 2. БЕКЕНД (Node.js + TypeScript) ===
  backend:
    # Ищет Dockerfile в текущей папке (корне)
    build: .
    container_name: avtokond_backend
    restart: always
    # Пробрасываем внешний порт 4080 (для Nginx) на внутренний порт 3000 (Express)
    ports:
      - "4080:3000"
    volumes:
      # Монтируем корневую папку в /app для удобной разработки
      - .:/app
      - /app/node_modules # Изолируем папку зависимостей от локальной машины
    environment:
      PORT: ${PORT}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/avtokond_prod
      SMTP_USER: ${EMAIL_USER}
      SMTP_PASS: ${EMAIL_PASS}
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:


networks:
  app-network:
    driver: bridge
