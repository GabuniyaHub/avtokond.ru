version: '3.8'

services:
  # === 1. БАЗА ДАННЫХ (PostgreSQL) ===
  db:
    image: postgres:15-alpine
    container_name: avtokond_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: avtokond_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # === 2. БЕКЕНД (Node.js + TypeScript) ===
  backend:
    # Ищет Dockerfile в текущей папке (корне)
    build: . 
    container_name: avtokond_backend
    restart: always
    # Пробрасываем внешний порт 4080 (для Nginx) на внутренний порт 3000 (Express)
    ports:
      - "4080:3000"
    volumes:
      # Монтируем корневую папку в /app для удобной разработки
      - .:/app
      - /app/node_modules # Изолируем папку зависимостей от локальной машины
    environment:
      PORT: ${PORT}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/avtokond_prod
      SMTP_USER: ${EMAIL_USER}
      SMTP_PASS: ${EMAIL_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge